```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>ฟอร์มสมัครสมาชิก</h1>

    <form>

        <!-- Text Box -->
        <label>ชื่อ-สกุล</label>
        <input type="text"
               name="fullname"
               placeholder="นายกฤติเมธ ฝ่ายขัน"
               required>

        <!-- Email -->
        <label>อีเมล</label>
        <input type="email"
               name="email"
               placeholder="68319010006@swdtcmail.com"
               required>

        <!-- Password -->
        <label>รหัสผ่าน</label>
        <input type="password"
               name="password"
               minlength="8"
               placeholder="อย่างน้อย 8 ตัวอักษร"
               required>

        <!-- Text Box พร้อม Validation -->
        <label>เบอร์โทรศัพท์</label>
        <input type="text"
               name="phone"
               placeholder="08xxxxxxxx"
               pattern="[0-9]{10}"
               required>

        <!-- Radio Button -->
        <label>เพศ</label>
        <div class="radio-group">
            <label><input type="radio" name="gender" required> ชาย</label>
            <label><input type="radio" name="gender"> หญิง</label>
            <label><input type="radio" name="gender"> อื่น ๆ</label>
        </div>

        <!-- Select -->
        <label>ระดับการศึกษา</label>
        <select required>
            <option value="">-- เลือกระดับการศึกษา --</option>
            <option>ปวช.</option>
            <option>ปวส.</option>
            <option>ปริญญาตรี</option>
            <option>ปริญญาโท</option>
        </select>

        <!-- Textarea -->
        <label>แนะนำตัวเอง</label>
        <textarea rows="5"
                  placeholder="กรอกข้อมูลเพิ่มเติม"></textarea>

        <!-- Checkbox -->
        <div class="checkbox-group">
            <label>
                <input type="checkbox" required>
                ยอมรับเงื่อนไขและนโยบายการใช้งาน
            </label>
        </div>

        <!-- Submit -->
        <button type="submit">สมัครสมาชิก</button>

    </form>
</div>

</body>
</html>
```
